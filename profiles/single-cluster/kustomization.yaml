# Single-cluster profile: deploys everything on one OpenShift cluster.
# Multi-cluster routing (ai-gateway) is excluded.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Platform
  - ../../manifests/platform/monitoring-config
  - ../../manifests/platform/rhoai-instance
  - ../../manifests/platform/maas-postgres
  - ../../manifests/platform/observability
  - ../../manifests/platform/authorino-tls
  - ../../manifests/platform/kuadrant
  # Model
  - ../../manifests/model
  # llm-d
  - ../../manifests/llm-d
  # Guardrails
  - ../../manifests/guardrails
  # OIDC
  - ../../manifests/oidc
  # Vault + ESO
  - ../../manifests/vault-eso
