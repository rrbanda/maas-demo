# Multi-cluster profile: gateway cluster (CPU).
# Deploys the AI Gateway, Vault, ESO, and ExternalModel components.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # AI Gateway (multi-cluster routing)
  - ../../../manifests/ai-gateway
  # Kuadrant (AuthPolicy + RateLimitPolicy enforcement)
  - ../../../manifests/platform/kuadrant
  # Authorino TLS (for OIDC auth enforcement)
  - ../../../manifests/platform/authorino-tls
  # Vault + ESO
  - ../../../manifests/vault-eso
  # ExternalModel CRs + provider credentials + Gemini path rewrite
  - ../../../manifests/external-models
