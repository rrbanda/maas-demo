# Multi-cluster profile: gateway cluster (CPU).
# Deploys the AI Bridge with centralized MaaS governance, Vault, ESO, and ExternalModel routing.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # MaaS Governance (Tenant, Subscriptions, AuthPolicies)
  - ../../../manifests/maas-governance
  # AI Gateway (multi-cluster routing)
  - ../../../manifests/ai-gateway
  # Kuadrant (AuthPolicy + RateLimitPolicy enforcement)
  - ../../../manifests/platform/kuadrant
  # Authorino TLS (for OIDC auth enforcement)
  - ../../../manifests/platform/authorino-tls
  # Vault + ESO
  - ../../../manifests/vault-eso
  # ExternalModel CRs + provider credentials + Gemini path rewrite
  - ../../../manifests/external-models
  # Observability: Perses deployment, SA, datasource, dashboards
  - ../../../manifests/observability
  # Kueue LocalQueue — enables Workload metrics page in RHOAI Dashboard
  - ../../../manifests/platform/kueue
  # DSCI patch — adds required storage config for RHOAI monitoring stack
  - ../../../manifests/platform/dsci-patch
  # ServiceMonitors + MonitoringStack patch
  - ../../../manifests/platform/observability
