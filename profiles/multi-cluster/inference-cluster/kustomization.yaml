# Multi-cluster profile: inference cluster (GPU).
# Deploys platform components, llm-d, guardrails, and OIDC.
# Note: qwen25-7b-instruct model removed due to GPU resource constraints.
# The gemma2-9b-fp8 model is deployed separately via model-gemma2-9b-fp8 ArgoCD app.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Platform
  - ../../../manifests/platform/monitoring-config
  - ../../../manifests/platform/rhoai-instance
  - ../../../manifests/platform/maas-postgres
  - ../../../manifests/platform/observability
  - ../../../manifests/platform/authorino-tls
  # Observability (Perses dashboards initialization)
  - ../../../manifests/observability
  # llm-d (scheduler for intelligent inference routing)
  - ../../../manifests/llm-d
  # Guardrails
  - ../../../manifests/guardrails
  # OIDC
  - ../../../manifests/oidc
  # Multi-cluster LB: /v1/ route with anonymous auth for AI Bridge access
  - ../../../manifests/multi-cluster-lb-inference
