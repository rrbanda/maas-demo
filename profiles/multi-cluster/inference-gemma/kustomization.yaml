# Multi-cluster profile: inference cluster running gemma2-9b-fp8 with llm-d.
# The gemma2-9b-fp8 model (LLMInferenceService, PVC, download Job) is deployed
# separately -- either via a dedicated ArgoCD Application or imperatively.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  # Inference clusters do NOT need MaaS governance -- only the AI Bridge does.
  - target:
      kind: DataScienceCluster
      name: default-dsc
    patch: |-
      - op: replace
        path: /spec/components/kserve/modelsAsService/managementState
        value: Removed
resources:
  # Platform
  - ../../../manifests/platform/monitoring-config
  - ../../../manifests/platform/rhoai-instance
  - ../../../manifests/platform/maas-postgres
  - ../../../manifests/platform/observability
  - ../../../manifests/platform/authorino-tls
  # Observability (Perses dashboards initialization)
  - ../../../manifests/observability
  # llm-d EPP is now managed by KServe via scheduler: {} in LLMInferenceService.
  # The standalone manifests/llm-d-inference/ is no longer needed.
  # Guardrails
  - ../../../manifests/guardrails
  # OIDC
  - ../../../manifests/oidc
  # Direct /v1/ route with anonymous auth for AI Bridge access
  - ../../../manifests/multi-cluster-lb-inference
