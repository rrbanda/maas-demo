apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen25-model-weights
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: qwen25-7b-instruct
spec:
  # RWX required for multi-replica vLLM serving (multiple pods read model weights).
  # Requires a StorageClass that supports ReadWriteMany (NFS, CephFS, etc.).
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
