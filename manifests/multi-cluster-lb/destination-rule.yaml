# DestinationRule configures TLS origination for Cluster 3's vLLM endpoint.
# insecureSkipVerify is required because vLLM uses a self-signed KServe certificate.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: gemma-cluster3-tls
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/part-of: multi-cluster-lb
spec:
  host: REPLACE_WITH_CLUSTER3_VLLM_HOST
  trafficPolicy:
    tls:
      mode: SIMPLE
      insecureSkipVerify: true
