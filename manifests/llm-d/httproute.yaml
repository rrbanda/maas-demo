# HTTPRoute for llm-d InferencePool intelligent routing.
#
# IMPORTANT: This HTTPRoute requires a gateway controller that supports the
# Gateway API Inference Extension (InferencePool backendRef). As of RHOAI 3.4,
# the OpenShift gateway controller reports "unsupported backendRef" for
# InferencePool kind. The ext_proc integration with llm-d may work through
# Istio's ENABLE_GATEWAY_API_INFERENCE_EXTENSION flag, but requires additional
# configuration.
#
# Current state:
# - llm-d EPP is deployed and healthy
# - InferencePool and InferenceModel CRDs exist
# - llm-d is tracking vLLM pods and collecting metrics
# - HTTPRoute with InferencePool backendRef is NOT processed by the gateway
#
# For production use:
# - Verify Gateway API Inference Extension is fully configured
# - Check Istiod has ENABLE_GATEWAY_API_INFERENCE_EXTENSION=true
# - Ensure proper ext_proc EnvoyFilter is created for llm-d
#
# Reference: https://gateway-api-inference-extension.sigs.k8s.io/
#
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-inference-route
  namespace: llm-inference
  labels:
    app.kubernetes.io/part-of: llm-d-epp
  annotations:
    maas.opendatahub.io/status: "requires-gateway-api-inference-extension"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: maas-default-gateway
      namespace: openshift-ingress
  hostnames:
    - "llm-d-inference.apps.REPLACE_WITH_CLUSTER_DOMAIN"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: gemma2-9b-fp8-pool
      timeouts:
        request: "0s"
        backendRequest: "0s"
