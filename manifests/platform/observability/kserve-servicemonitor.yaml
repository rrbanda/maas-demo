apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kserve-vllm-metrics
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/part-of: ai-bridge-observability
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      kserve.io/component: workload
  endpoints:
    - port: h2c
      path: /metrics
      interval: 30s
