apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kserve-vllm-metrics
  namespace: llm-inference
  labels:
    app.kubernetes.io/part-of: ai-bridge-observability
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: llminferenceservice
  namespaceSelector:
    matchNames:
      - llm-inference
  endpoints:
    - port: https
      path: /metrics
      interval: 30s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
