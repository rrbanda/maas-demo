apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: authorino-metrics
  namespace: kuadrant-system
  labels:
    app: authorino
    app.kubernetes.io/part-of: ai-bridge-observability
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: authorino
  endpoints:
    - port: http
      interval: 15s
