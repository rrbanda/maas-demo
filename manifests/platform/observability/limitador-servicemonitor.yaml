apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: kuadrant-system
  labels:
    app: limitador
    app.kubernetes.io/part-of: ai-bridge-observability
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app: limitador
  endpoints:
    - port: http
      interval: 15s
      path: /metrics
