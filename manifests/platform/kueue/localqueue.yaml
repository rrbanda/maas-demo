# LocalQueues enable the Workload metrics page in the RHOAI Dashboard for each project.
# Per RHOAI 3.4 docs, a project must contain a LocalQueue (and have the
# kueue.openshift.io/managed=true namespace label) for the Workload metrics page
# to display CPU/memory usage for distributed workloads.
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: local-queue-default
  namespace: models-as-a-service
spec:
  clusterQueueName: default
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: local-queue-default
  namespace: ai-guardrails
spec:
  clusterQueueName: default
