# ClusterRoleBindings created by the Authorino operator.
# Defined here so ArgoCD can track them (operator adds our app label to child resources).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authorino-authorino
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: authorino-manager-role
subjects:
  - kind: ServiceAccount
    name: authorino-authorino
    namespace: kuadrant-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authorino-authorino-k8s-auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: authorino-manager-k8s-auth-role
subjects:
  - kind: ServiceAccount
    name: authorino-authorino
    namespace: kuadrant-system
