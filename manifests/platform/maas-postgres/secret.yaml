# PREREQUISITE: This Secret must be created manually before deploying.
# It is NOT stored in Git for security.
#
#   oc create secret generic maas-db-config -n maas-db \
#     --from-literal=POSTGRES_USER=maas \
#     --from-literal=POSTGRES_DB=maas \
#     --from-literal=POSTGRES_PASSWORD=<your-password> \
#     --from-literal=DATABASE_URL='postgresql://maas:<your-password>@postgresql.maas-db.svc:5432/maas?sslmode=disable'
#
# ArgoCD will NOT manage this Secret (it is excluded from the kustomization).
# The PostgreSQL StatefulSet references it and will fail to start if missing.
