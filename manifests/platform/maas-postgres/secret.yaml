# Database credentials are pulled from Vault via ExternalSecrets Operator.
# The vault-init job seeds these at: secret/ai-bridge/db-credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: maas-db-config
  namespace: maas-db
  labels:
    app.kubernetes.io/part-of: maas
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: maas-db-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        POSTGRES_USER: maas
        POSTGRES_DB: maas
        POSTGRES_PASSWORD: "{{ .postgres_password }}"
        DATABASE_URL: "{{ .postgres_url }}"
  data:
    - secretKey: postgres_password
      remoteRef:
        key: ai-bridge/db-credentials
        property: postgres-password
    - secretKey: postgres_url
      remoteRef:
        key: ai-bridge/db-credentials
        property: postgres-url
