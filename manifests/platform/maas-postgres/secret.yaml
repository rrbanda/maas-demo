apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: maas-db
  labels:
    app.kubernetes.io/part-of: maas
type: Opaque
stringData:
  POSTGRES_USER: maas
  POSTGRES_PASSWORD: REPLACE_WITH_DB_PASSWORD
  POSTGRES_DB: maas
  DATABASE_URL: "postgresql://maas:REPLACE_WITH_DB_PASSWORD@postgresql.maas-db.svc:5432/maas?sslmode=disable"
