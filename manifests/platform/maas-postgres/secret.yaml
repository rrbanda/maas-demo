# PREREQUISITE: Two secrets must be created manually before deploying.
# They are NOT stored in Git for security.
#
# 1. PostgreSQL StatefulSet secret (in maas-db namespace):
#
#   oc create secret generic postgresql-credentials -n maas-db \
#     --from-literal=POSTGRES_USER=maas \
#     --from-literal=POSTGRES_DB=maas \
#     --from-literal=POSTGRES_PASSWORD=<your-password>
#
# 2. MaaS API database connection secret (in redhat-ods-applications namespace):
#    This is where the maas-api deployment reads the DB connection from.
#    See: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html-single/govern_llm_access_with_models-as-a-service/index#configure-database-secret-maas
#
#   oc create secret generic maas-db-config -n redhat-ods-applications \
#     --from-literal=DB_CONNECTION_URL='postgresql://maas:<your-password>@postgresql.maas-db.svc:5432/maas?sslmode=disable'
#
# ArgoCD will NOT manage these Secrets (excluded from the kustomization).
# The PostgreSQL StatefulSet references postgresql-credentials and will fail to start if missing.
# The MaaS API references maas-db-config in redhat-ods-applications and Tenant will show Degraded if missing.
