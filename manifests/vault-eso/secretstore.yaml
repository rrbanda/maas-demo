# The vault-token Secret must be pre-created by the operator (not stored in git):
#   oc create secret generic vault-token -n vault-dev --from-literal=token=<vault-root-token>
# For dev mode vault, the token is set via VAULT_DEV_ROOT_TOKEN_ID in the deployment.
---
# Namespace-scoped SecretStore for vault-dev
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: vault-dev
spec:
  provider:
    vault:
      server: "http://vault.vault-dev.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
# ClusterSecretStore for cross-namespace access (used by models-as-a-service)
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-cluster-backend
spec:
  provider:
    vault:
      server: "http://vault.vault-dev.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: vault-dev
