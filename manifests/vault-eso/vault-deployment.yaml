apiVersion: v1
kind: Namespace
metadata:
  name: vault-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: docker.io/hashicorp/vault:1.17
          command: ["/bin/sh", "-c"]
          args:
            - |
              export SKIP_SETCAP=1
              vault server -dev \
                -dev-root-token-id="$VAULT_DEV_ROOT_TOKEN_ID" \
                -dev-listen-address=0.0.0.0:8200 \
                -dev-no-store-token 2>&1 || sleep 3600
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
            - name: SKIP_SETCAP
              value: "1"
            - name: HOME
              value: "/tmp"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault-dev
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
