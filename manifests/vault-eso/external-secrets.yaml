apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-bridge-api-keys
  namespace: vault-dev
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ai-bridge-api-keys
    creationPolicy: Owner
  data:
    - secretKey: team-a-key
      remoteRef:
        key: ai-bridge/api-keys
        property: team-a-key
    - secretKey: team-b-key
      remoteRef:
        key: ai-bridge/api-keys
        property: team-b-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-bridge-db-credentials
  namespace: vault-dev
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ai-bridge-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: ai-bridge/db-credentials
        property: postgres-password
    - secretKey: postgres-url
      remoteRef:
        key: ai-bridge/db-credentials
        property: postgres-url
---
# NetworkPolicy allowing ESO pods to reach Vault
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-dev
      ports:
        - port: 8200
          protocol: TCP
