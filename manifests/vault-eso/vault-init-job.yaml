apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault-dev
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: vault-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: docker.io/hashicorp/vault:1.17
          command: ["/bin/sh", "-c"]
          args:
            - |
              until vault status > /dev/null 2>&1; do
                echo "Waiting for Vault..."
                sleep 2
              done
              echo "Populating AI Bridge secrets..."
              vault kv put secret/ai-bridge/api-keys \
                team-a-key="$TEAM_A_KEY" \
                team-b-key="$TEAM_B_KEY"
              vault kv put secret/ai-bridge/db-credentials \
                postgres-password="$POSTGRES_PASSWORD" \
                postgres-url="$DATABASE_URL"
              echo "Populating ExternalModel provider credentials..."
              vault kv put secret/gemini-credentials \
                api-key="$GEMINI_API_KEY"
              vault kv put secret/vllm-cluster2-credentials \
                api-key="$VLLM_BEARER_TOKEN"
              echo "Vault initialization complete."
              vault kv list secret/
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault-dev.svc:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: vault-token
            - name: TEAM_A_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: team-a-key
            - name: TEAM_B_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: team-b-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: postgres-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: database-url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: gemini-api-key
            - name: VLLM_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-seed-credentials
                  key: vllm-bearer-token
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
