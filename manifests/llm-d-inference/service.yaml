apiVersion: v1
kind: Service
metadata:
  name: llm-d-epp
  namespace: llm-inference
  labels:
    app: llm-d-epp
    app.kubernetes.io/part-of: llm-d-epp
spec:
  selector:
    app: llm-d-epp
  ports:
    - port: 9002
      targetPort: 9002
      name: grpc
      appProtocol: h2c
    - port: 9003
      targetPort: 9003
      name: health
    - port: 9090
      targetPort: 9090
      name: metrics
