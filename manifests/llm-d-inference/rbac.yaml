apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-d-epp
  namespace: llm-inference
  labels:
    app.kubernetes.io/part-of: llm-d-epp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-d-epp
  labels:
    app.kubernetes.io/part-of: llm-d-epp
rules:
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools", "inferencepools/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencemodels", "inferencemodels/status", "inferenceobjectives", "inferencepoolimports", "inferencemodelrewrites"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-d-epp-llm-inference
  labels:
    app.kubernetes.io/part-of: llm-d-epp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-d-epp
subjects:
  - kind: ServiceAccount
    name: llm-d-epp
    namespace: llm-inference
