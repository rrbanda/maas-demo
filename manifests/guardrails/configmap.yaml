apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrails-config
  namespace: ai-guardrails
  labels:
    app.kubernetes.io/part-of: guardrails-gateway
data:
  config.yaml: |
    orchestrator:
      host: localhost
      port: 8085
    detectors:
      - name: regex-pii
        input: true
        output: true
        detector_params:
          regex:
            - email
            - ssn
            - credit_card
    routes:
      - name: pii
        detectors:
          - regex-pii
        fallback_message: "Request blocked: PII detected in content."
      - name: passthrough
        detectors:
  orchestrator.py: |
    import http.server
    import json
    import ssl
    import urllib.request
    import os

    VLLM_URL = os.environ.get("VLLM_URL", "https://REPLACE_WITH_VLLM_SERVICE:8000")

    class OrchestratorHandler(http.server.BaseHTTPRequestHandler):
        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length)
            req = json.loads(body)
            vllm_req = json.dumps(req).encode()
            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE
            vllm_request = urllib.request.Request(
                f"{VLLM_URL}/v1/chat/completions",
                data=vllm_req,
                headers={"Content-Type": "application/json"},
            )
            try:
                with urllib.request.urlopen(vllm_request, context=ctx) as resp:
                    result = resp.read()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(result)
            except Exception as e:
                self.send_response(502)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"error": str(e)}).encode())

        def log_message(self, format, *args):
            pass

    if __name__ == "__main__":
        server = http.server.HTTPServer(("0.0.0.0", 8085), OrchestratorHandler)
        print("Orchestrator proxy listening on :8085")
        server.serve_forever()
