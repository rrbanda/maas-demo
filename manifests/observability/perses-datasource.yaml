# PersesGlobalDatasource: makes Thanos available to all Perses projects/dashboards.
# Uses kubernetesAuth (pod SA token) — auto-rotated, no manual expiry.
# The data-science-perses SA must have cluster-monitoring-view ClusterRole (see perses-rbac.yaml).
apiVersion: perses.dev/v1alpha2
kind: PersesGlobalDatasource
metadata:
  name: prometheus-datasource
spec:
  client:
    kubernetesAuth:
      enable: true
    tls:
      enable: true
      insecureSkipVerify: true
  config:
    default: true
    display:
      name: "Thanos (OpenShift Monitoring)"
    plugin:
      kind: PrometheusDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: "https://thanos-querier.openshift-monitoring.svc:9091"
