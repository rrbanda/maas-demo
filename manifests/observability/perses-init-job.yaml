---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses-init
  namespace: redhat-ods-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: perses-init-reader
rules:
  - apiGroups: ["perses.dev"]
    resources: ["persesdashboards"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-init-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: perses-init-reader
subjects:
  - kind: ServiceAccount
    name: perses-init
    namespace: redhat-ods-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-init-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: perses-init
    namespace: redhat-ods-monitoring
---
# Allow perses-init to create long-lived tokens for itself
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: perses-init-token-creator
  namespace: redhat-ods-monitoring
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["perses-init"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: perses-init-token-creator-binding
  namespace: redhat-ods-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: perses-init-token-creator
subjects:
  - kind: ServiceAccount
    name: perses-init
    namespace: redhat-ods-monitoring
---
# CronJob to refresh Perses authentication token weekly
# Uses long-lived tokens (10 years) to avoid frequent expiration
# Weekly refresh ensures recovery after pod restarts
apiVersion: batch/v1
kind: CronJob
metadata:
  name: perses-token-refresh
  namespace: redhat-ods-monitoring
spec:
  schedule: "0 0 * * 0"  # Weekly on Sunday at midnight
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: perses-init
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: registry.redhat.io/openshift4/ose-cli:latest
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  PERSES_URL="http://data-science-perses.redhat-ods-monitoring.svc:8080"
                  # Create a long-lived token (10 years) instead of using the pod's short-lived token
                  TOKEN=$(oc create token perses-init -n redhat-ods-monitoring --duration=87600h)
                  
                  echo "[$(date -Iseconds)] Starting Perses token refresh..."
                  
                  # Wait for Perses with timeout
                  echo "Waiting for Perses to be ready..."
                  for i in $(seq 1 30); do
                    if curl -sf "$PERSES_URL/api/v1/health" | grep -q "database"; then
                      echo "Perses is ready."
                      break
                    fi
                    if [ $i -eq 30 ]; then
                      echo "ERROR: Perses not ready after 150 seconds"
                      exit 1
                    fi
                    sleep 5
                  done
                  
                  # Refresh GlobalSecret with new token
                  echo "Refreshing thanos-auth GlobalSecret..."
                  curl -sf -X DELETE "$PERSES_URL/api/v1/globalsecrets/thanos-auth" > /dev/null 2>&1 || true
                  RESULT=$(curl -sf -X POST "$PERSES_URL/api/v1/globalsecrets" \
                    -H "Content-Type: application/json" \
                    -d "{\"kind\":\"GlobalSecret\",\"metadata\":{\"name\":\"thanos-auth\"},\"spec\":{\"tlsConfig\":{\"insecureSkipVerify\":true},\"authorization\":{\"type\":\"Bearer\",\"credentials\":\"$TOKEN\"}}}")
                  if [ $? -ne 0 ]; then
                    echo "ERROR: Failed to create GlobalSecret"
                    exit 1
                  fi
                  echo "GlobalSecret created."
                  
                  # Recreate datasources with fresh secret reference
                  echo "Refreshing GlobalDatasources..."
                  curl -sf -X DELETE "$PERSES_URL/api/v1/globaldatasources/prometheus" > /dev/null 2>&1 || true
                  curl -sf -X POST "$PERSES_URL/api/v1/globaldatasources" \
                    -H "Content-Type: application/json" \
                    -d '{"kind":"GlobalDatasource","metadata":{"name":"prometheus"},"spec":{"default":true,"plugin":{"kind":"PrometheusDatasource","spec":{"proxy":{"kind":"HTTPProxy","spec":{"url":"https://thanos-querier.openshift-monitoring.svc:9091","allowedEndpoints":[{"endpointPattern":"/api/v1/.*","method":"GET"},{"endpointPattern":"/api/v1/.*","method":"POST"}],"secret":"thanos-auth"}}}}}}' > /dev/null
                  
                  curl -sf -X DELETE "$PERSES_URL/api/v1/globaldatasources/kuadrant-prometheus-datasource" > /dev/null 2>&1 || true
                  curl -sf -X POST "$PERSES_URL/api/v1/globaldatasources" \
                    -H "Content-Type: application/json" \
                    -d '{"kind":"GlobalDatasource","metadata":{"name":"kuadrant-prometheus-datasource"},"spec":{"default":false,"plugin":{"kind":"PrometheusDatasource","spec":{"proxy":{"kind":"HTTPProxy","spec":{"url":"https://thanos-querier.openshift-monitoring.svc:9091","allowedEndpoints":[{"endpointPattern":"/api/v1/.*","method":"GET"},{"endpointPattern":"/api/v1/.*","method":"POST"}],"secret":"thanos-auth"}}}}}}' > /dev/null
                  echo "GlobalDatasources refreshed."
                  
                  # Verify connectivity
                  echo "Verifying datasource connectivity..."
                  VERIFY=$(curl -sf "$PERSES_URL/proxy/globaldatasources/prometheus/api/v1/query?query=up" 2>&1 | head -c 100)
                  if echo "$VERIFY" | grep -q '"status":"success"'; then
                    echo "Verification: OK"
                  else
                    echo "WARNING: Datasource verification returned unexpected result"
                  fi
                  
                  echo "[$(date -Iseconds)] Token refresh completed successfully."
---
# Initial Job runs once on ArgoCD sync to set up Perses completely
apiVersion: batch/v1
kind: Job
metadata:
  name: perses-init
  namespace: redhat-ods-monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: perses-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              PERSES_URL="http://data-science-perses.redhat-ods-monitoring.svc:8080"
              
              echo "============================================"
              echo "Perses Observability Initialization"
              echo "============================================"
              
              # Wait for Perses to be ready
              echo "Waiting for Perses..."
              for i in $(seq 1 60); do
                if curl -s "$PERSES_URL/api/v1/health" | grep -q "database"; then
                  echo "Perses is ready!"
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "ERROR: Perses not ready after 10 minutes"
                  exit 1
                fi
                sleep 10
              done
              
              # Create long-lived token (10 years) for Thanos access
              TOKEN=$(oc create token perses-init -n redhat-ods-monitoring --duration=87600h)
              echo "Long-lived token created (length: ${#TOKEN}, valid for 10 years)"
              
              # Create Projects
              echo "Creating projects..."
              for project in redhat-ods-monitoring models-as-a-service redhat-ods-applications; do
                curl -s -X POST "$PERSES_URL/api/v1/projects" \
                  -H "Content-Type: application/json" \
                  -d "{\"kind\":\"Project\",\"metadata\":{\"name\":\"$project\"},\"spec\":{}}" > /dev/null 2>&1 || true
                echo "  Created: $project"
              done
              
              # Create GlobalSecret
              echo "Creating GlobalSecret..."
              curl -s -X DELETE "$PERSES_URL/api/v1/globalsecrets/thanos-auth" > /dev/null 2>&1 || true
              curl -s -X POST "$PERSES_URL/api/v1/globalsecrets" \
                -H "Content-Type: application/json" \
                -d "{\"kind\":\"GlobalSecret\",\"metadata\":{\"name\":\"thanos-auth\"},\"spec\":{\"tlsConfig\":{\"insecureSkipVerify\":true},\"authorization\":{\"type\":\"Bearer\",\"credentials\":\"$TOKEN\"}}}" > /dev/null
              
              # Create Datasources
              echo "Creating GlobalDatasources..."
              curl -s -X DELETE "$PERSES_URL/api/v1/globaldatasources/prometheus" > /dev/null 2>&1 || true
              curl -s -X POST "$PERSES_URL/api/v1/globaldatasources" \
                -H "Content-Type: application/json" \
                -d '{"kind":"GlobalDatasource","metadata":{"name":"prometheus"},"spec":{"default":true,"plugin":{"kind":"PrometheusDatasource","spec":{"proxy":{"kind":"HTTPProxy","spec":{"url":"https://thanos-querier.openshift-monitoring.svc:9091","allowedEndpoints":[{"endpointPattern":"/api/v1/.*","method":"GET"},{"endpointPattern":"/api/v1/.*","method":"POST"}],"secret":"thanos-auth"}}}}}}' > /dev/null
              
              curl -s -X DELETE "$PERSES_URL/api/v1/globaldatasources/kuadrant-prometheus-datasource" > /dev/null 2>&1 || true
              curl -s -X POST "$PERSES_URL/api/v1/globaldatasources" \
                -H "Content-Type: application/json" \
                -d '{"kind":"GlobalDatasource","metadata":{"name":"kuadrant-prometheus-datasource"},"spec":{"default":false,"plugin":{"kind":"PrometheusDatasource","spec":{"proxy":{"kind":"HTTPProxy","spec":{"url":"https://thanos-querier.openshift-monitoring.svc:9091","allowedEndpoints":[{"endpointPattern":"/api/v1/.*","method":"GET"},{"endpointPattern":"/api/v1/.*","method":"POST"}],"secret":"thanos-auth"}}}}}}' > /dev/null
              
              # Push Dashboards
              echo "Pushing dashboards..."
              for dash in dashboard-0-cluster-admin dashboard-1-model maas-gateway-metrics; do
                CONFIG=$(oc get persesdashboard "$dash" -n redhat-ods-monitoring -o jsonpath='{.spec.config}' 2>/dev/null || echo "")
                if [ -n "$CONFIG" ] && [ "$CONFIG" != "null" ]; then
                  curl -s -X DELETE "$PERSES_URL/api/v1/projects/redhat-ods-monitoring/dashboards/$dash" > /dev/null 2>&1 || true
                  RESULT=$(curl -s -X POST "$PERSES_URL/api/v1/projects/redhat-ods-monitoring/dashboards" \
                    -H "Content-Type: application/json" \
                    -d "{\"kind\":\"Dashboard\",\"metadata\":{\"name\":\"$dash\",\"project\":\"redhat-ods-monitoring\"},\"spec\":$CONFIG}")
                  DISPLAY=$(echo "$RESULT" | grep -o '"display":{"name":"[^"]*"' | head -1 | sed 's/.*"name":"//' | sed 's/"//' || echo "$dash")
                  echo "  $DISPLAY"
                fi
              done
              
              # Usage dashboard
              CONFIG=$(oc get persesdashboard dashboard-3-maas-usage-admin -n redhat-ods-applications -o jsonpath='{.spec.config}' 2>/dev/null || echo "")
              if [ -n "$CONFIG" ] && [ "$CONFIG" != "null" ]; then
                curl -s -X DELETE "$PERSES_URL/api/v1/projects/redhat-ods-monitoring/dashboards/dashboard-3-maas-usage-admin" > /dev/null 2>&1 || true
                curl -s -X POST "$PERSES_URL/api/v1/projects/redhat-ods-monitoring/dashboards" \
                  -H "Content-Type: application/json" \
                  -d "{\"kind\":\"Dashboard\",\"metadata\":{\"name\":\"dashboard-3-maas-usage-admin\",\"project\":\"redhat-ods-monitoring\"},\"spec\":$CONFIG}" > /dev/null
                echo "  Usage"
              fi
              
              # Verify
              echo ""
              echo "Testing datasource connectivity..."
              RESULT=$(curl -s "$PERSES_URL/proxy/globaldatasources/prometheus/api/v1/query?query=up" | head -c 100)
              if echo "$RESULT" | grep -q '"status":"success"'; then
                echo "  Datasource: OK"
              else
                echo "  Datasource: ERROR"
              fi
              
              echo ""
              echo "============================================"
              echo "Perses initialization complete!"
              echo "============================================"
