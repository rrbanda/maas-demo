---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses-init
  namespace: redhat-ods-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: perses-init-reader
rules:
  - apiGroups: ["perses.dev"]
    resources: ["persesdashboards"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-init-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: perses-init-reader
subjects:
  - kind: ServiceAccount
    name: perses-init
    namespace: redhat-ods-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-init-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: perses-init
    namespace: redhat-ods-monitoring
---
apiVersion: batch/v1
kind: Job
metadata:
  name: perses-init
  namespace: redhat-ods-monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: perses-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              PERSES_URL="http://data-science-perses.redhat-ods-monitoring.svc:8080"
              
              echo "============================================"
              echo "Perses Observability Initialization"
              echo "============================================"
              
              # Wait for Perses to be ready
              echo "Waiting for Perses..."
              for i in $(seq 1 60); do
                if curl -s "$PERSES_URL/api/v1/health" | grep -q "database"; then
                  echo "Perses is ready!"
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "ERROR: Perses not ready after 10 minutes"
                  exit 1
                fi
                echo "  Waiting... ($i/60)"
                sleep 10
              done
              
              # Get SA token for Thanos authentication
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              echo "Token obtained (length: ${#TOKEN})"
              
              # ============================================
              # STEP 1: Create Projects
              # ============================================
              echo ""
              echo "Creating projects..."
              for project in redhat-ods-monitoring models-as-a-service redhat-ods-applications; do
                curl -s -X POST "$PERSES_URL/api/v1/projects" \
                  -H "Content-Type: application/json" \
                  -d "{\"kind\":\"Project\",\"metadata\":{\"name\":\"$project\"},\"spec\":{}}" > /dev/null 2>&1 || true
                echo "  Created: $project"
              done
              
              # ============================================
              # STEP 2: Create GlobalSecret for TLS + Auth
              # ============================================
              echo ""
              echo "Creating GlobalSecret (thanos-auth)..."
              # Delete existing if present
              curl -s -X DELETE "$PERSES_URL/api/v1/globalsecrets/thanos-auth" > /dev/null 2>&1 || true
              
              # Create with TLS skip verify and Bearer token
              curl -s -X POST "$PERSES_URL/api/v1/globalsecrets" \
                -H "Content-Type: application/json" \
                -d "{
                  \"kind\": \"GlobalSecret\",
                  \"metadata\": {\"name\": \"thanos-auth\"},
                  \"spec\": {
                    \"tlsConfig\": {
                      \"insecureSkipVerify\": true
                    },
                    \"authorization\": {
                      \"type\": \"Bearer\",
                      \"credentials\": \"$TOKEN\"
                    }
                  }
                }" > /dev/null
              echo "  Created: thanos-auth"
              
              # ============================================
              # STEP 3: Create GlobalDatasources
              # ============================================
              echo ""
              echo "Creating GlobalDatasources..."
              
              # Delete existing datasources
              curl -s -X DELETE "$PERSES_URL/api/v1/globaldatasources/prometheus" > /dev/null 2>&1 || true
              curl -s -X DELETE "$PERSES_URL/api/v1/globaldatasources/kuadrant-prometheus-datasource" > /dev/null 2>&1 || true
              
              # Create default prometheus datasource
              curl -s -X POST "$PERSES_URL/api/v1/globaldatasources" \
                -H "Content-Type: application/json" \
                -d '{
                  "kind": "GlobalDatasource",
                  "metadata": {"name": "prometheus"},
                  "spec": {
                    "default": true,
                    "plugin": {
                      "kind": "PrometheusDatasource",
                      "spec": {
                        "proxy": {
                          "kind": "HTTPProxy",
                          "spec": {
                            "url": "https://thanos-querier.openshift-monitoring.svc:9091",
                            "allowedEndpoints": [
                              {"endpointPattern": "/api/v1/.*", "method": "GET"},
                              {"endpointPattern": "/api/v1/.*", "method": "POST"}
                            ],
                            "secret": "thanos-auth"
                          }
                        }
                      }
                    }
                  }
                }' > /dev/null
              echo "  Created: prometheus (default)"
              
              # Create kuadrant datasource (required by MaaS Usage dashboard)
              curl -s -X POST "$PERSES_URL/api/v1/globaldatasources" \
                -H "Content-Type: application/json" \
                -d '{
                  "kind": "GlobalDatasource",
                  "metadata": {"name": "kuadrant-prometheus-datasource"},
                  "spec": {
                    "default": false,
                    "plugin": {
                      "kind": "PrometheusDatasource",
                      "spec": {
                        "proxy": {
                          "kind": "HTTPProxy",
                          "spec": {
                            "url": "https://thanos-querier.openshift-monitoring.svc:9091",
                            "allowedEndpoints": [
                              {"endpointPattern": "/api/v1/.*", "method": "GET"},
                              {"endpointPattern": "/api/v1/.*", "method": "POST"}
                            ],
                            "secret": "thanos-auth"
                          }
                        }
                      }
                    }
                  }
                }' > /dev/null
              echo "  Created: kuadrant-prometheus-datasource"
              
              # ============================================
              # STEP 4: Push Dashboards from PersesDashboard CRs
              # ============================================
              echo ""
              echo "Pushing dashboards..."
              
              # Function to push dashboard
              push_dashboard() {
                local name=$1
                local namespace=$2
                local project=$3
                
                echo "  Processing: $name (from $namespace)"
                
                # Get the config from the PersesDashboard CR (note: .spec.config not .spec)
                CONFIG=$(oc get persesdashboard "$name" -n "$namespace" -o jsonpath='{.spec.config}' 2>/dev/null || echo "")
                
                if [ -z "$CONFIG" ] || [ "$CONFIG" = "null" ]; then
                  echo "    WARNING: No config found, skipping"
                  return
                fi
                
                # Delete existing dashboard
                curl -s -X DELETE "$PERSES_URL/api/v1/projects/$project/dashboards/$name" > /dev/null 2>&1 || true
                
                # Push new dashboard
                RESULT=$(curl -s -X POST "$PERSES_URL/api/v1/projects/$project/dashboards" \
                  -H "Content-Type: application/json" \
                  -d "{\"kind\":\"Dashboard\",\"metadata\":{\"name\":\"$name\",\"project\":\"$project\"},\"spec\":$CONFIG}")
                
                if echo "$RESULT" | grep -q '"kind":"Dashboard"'; then
                  DISPLAY=$(echo "$RESULT" | grep -o '"display":{"name":"[^"]*"' | head -1 | sed 's/.*"name":"//' | sed 's/"//')
                  echo "    OK: $DISPLAY"
                else
                  echo "    ERROR: $(echo $RESULT | head -c 100)"
                fi
              }
              
              # Push dashboards from redhat-ods-monitoring
              push_dashboard "dashboard-0-cluster-admin" "redhat-ods-monitoring" "redhat-ods-monitoring"
              push_dashboard "dashboard-1-model" "redhat-ods-monitoring" "redhat-ods-monitoring"
              push_dashboard "maas-gateway-metrics" "redhat-ods-monitoring" "redhat-ods-monitoring"
              
              # Push dashboard from redhat-ods-applications
              push_dashboard "dashboard-3-maas-usage-admin" "redhat-ods-applications" "redhat-ods-monitoring"
              
              # Push dashboard from models-as-a-service
              push_dashboard "maas-ai-bridge-metrics" "models-as-a-service" "models-as-a-service"
              
              # ============================================
              # STEP 5: Verify
              # ============================================
              echo ""
              echo "============================================"
              echo "Verification"
              echo "============================================"
              
              echo "Projects:"
              curl -s "$PERSES_URL/api/v1/projects" | grep -o '"name":"[^"]*"' | sed 's/"name":"//g' | sed 's/"//g' | sed 's/^/  /'
              
              echo ""
              echo "Datasources:"
              curl -s "$PERSES_URL/api/v1/globaldatasources" | grep -o '"name":"[^"]*"' | sed 's/"name":"//g' | sed 's/"//g' | sed 's/^/  /'
              
              echo ""
              echo "Secrets:"
              curl -s "$PERSES_URL/api/v1/globalsecrets" | grep -o '"name":"[^"]*"' | sed 's/"name":"//g' | sed 's/"//g' | sed 's/^/  /'
              
              echo ""
              echo "Dashboards in redhat-ods-monitoring:"
              curl -s "$PERSES_URL/api/v1/projects/redhat-ods-monitoring/dashboards" | grep -o '"display":{"name":"[^"]*"' | sed 's/"display":{"name":"//g' | sed 's/"//g' | sed 's/^/  /'
              
              echo ""
              echo "Testing datasource connectivity..."
              RESULT=$(curl -s "$PERSES_URL/proxy/globaldatasources/prometheus/api/v1/query?query=up" | head -c 100)
              if echo "$RESULT" | grep -q '"status":"success"'; then
                echo "  Datasource: OK (can query Thanos)"
              else
                echo "  Datasource: ERROR - $RESULT"
              fi
              
              echo ""
              echo "============================================"
              echo "Perses initialization complete!"
              echo "============================================"
