# PersesDashboard CRs in redhat-ods-monitoring namespace.
# The COO perses-operator reconciles these into the data-science-perses Perses instance.
# dashboard-0-cluster-admin and dashboard-1-model are managed by the RHOAI operator;
# tracked here for GitOps visibility but the operator owns their content.
#
# maas-gateway-metrics is owned by the MaaS operator and tracked here for reference.
# It provides Limitador + vLLM metrics panels for the MaaS gateway traffic.
apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: maas-gateway-metrics
  namespace: redhat-ods-monitoring
  labels:
    app.kubernetes.io/part-of: ai-bridge-observability
spec:
  config:
    display:
      name: "MaaS Gateway Metrics"
      description: "Per-subscription request rate, rate limits, and model latency"
    duration: 1h
    variables:
      - kind: ListVariable
        spec:
          display:
            name: Namespace
            hidden: false
          defaultValue: models-as-a-service
          allowAllValue: false
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - models-as-a-service
    panels:
      requestRate:
        kind: Panel
        spec:
          display:
            name: "Request Rate (req/s)"
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                position: bottom
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: 'sum(rate(kserve_http_requests_total{namespace="models-as-a-service"}[5m])) by (service)'
                    seriesNameFormat: "{{service}}"
      rateLimitedRequests:
        kind: Panel
        spec:
          display:
            name: "Rate-Limited Requests (429/s)"
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                position: bottom
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: 'sum(rate(limited_calls{namespace="models-as-a-service"}[5m]))'
                    seriesNameFormat: "Rate Limited"
      requestSuccessRate:
        kind: Panel
        spec:
          display:
            name: "Request Success Rate"
          plugin:
            kind: StatChart
            spec:
              calculation: mean
              format:
                unit: percent-decimal
                decimalPlaces: 1
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: '(sum(increase(kserve_vllm:request_success_total{namespace="models-as-a-service",finished_reason=~"length|stop"}[1h])) / sum(increase(kserve_vllm:request_success_total{namespace="models-as-a-service"}[1h]))) and (sum(increase(kserve_vllm:request_success_total{namespace="models-as-a-service"}[1h])) > 0)'
                    seriesNameFormat: "Success Rate"
      p90Latency:
        kind: Panel
        spec:
          display:
            name: "P90 E2E Latency"
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                format:
                  unit: seconds
              legend:
                position: bottom
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: 'histogram_quantile(0.90, sum by (le, model_name) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{namespace="models-as-a-service"}[5m])))'
                    seriesNameFormat: "p90 {{model_name}}"
      tokenThroughput:
        kind: Panel
        spec:
          display:
            name: "Token Throughput (tokens/s)"
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                position: bottom
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: 'sum(rate(kserve_vllm:generation_tokens_total{namespace="models-as-a-service"}[5m])) by (model_name)'
                    seriesNameFormat: "{{model_name}}"
      requestQueueLength:
        kind: Panel
        spec:
          display:
            name: "Request Queue Length"
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                position: bottom
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                    query: 'sum(kserve_vllm:num_requests_waiting{namespace="models-as-a-service"}) by (model_name)'
                    seriesNameFormat: "{{model_name}} waiting"
    layouts:
      - kind: Grid
        spec:
          display:
            title: "Overview"
            collapse:
              open: true
          items:
            - x: 0
              y: 0
              width: 8
              height: 4
              content:
                $ref: "#/spec/panels/requestSuccessRate"
            - x: 8
              y: 0
              width: 16
              height: 4
              content:
                $ref: "#/spec/panels/requestRate"
      - kind: Grid
        spec:
          display:
            title: "Performance"
            collapse:
              open: true
          items:
            - x: 0
              y: 0
              width: 12
              height: 8
              content:
                $ref: "#/spec/panels/p90Latency"
            - x: 12
              y: 0
              width: 12
              height: 8
              content:
                $ref: "#/spec/panels/tokenThroughput"
            - x: 0
              y: 8
              width: 12
              height: 8
              content:
                $ref: "#/spec/panels/rateLimitedRequests"
            - x: 12
              y: 8
              width: 12
              height: 8
              content:
                $ref: "#/spec/panels/requestQueueLength"
