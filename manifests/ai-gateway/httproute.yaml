# HTTPRoute with Host header rewrite — required for Istio TLS origination
# to match the remote OpenShift route's expected hostname.
# Replace REPLACE_WITH_REMOTE_MODEL_HOSTNAME with the same hostname used in service-entry.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-cluster-inference
  namespace: ai-gateway
  labels:
    app.kubernetes.io/part-of: ai-gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-inference-gateway
      namespace: ai-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: Host
                value: REPLACE_WITH_REMOTE_MODEL_HOSTNAME
      backendRefs:
        - group: ""
          kind: Service
          name: inference-backend
          port: 443
          weight: 1
