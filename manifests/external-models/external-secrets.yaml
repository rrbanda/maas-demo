# ExternalSecrets for provider credentials (synced from Vault).
# The critical requirement is the label: inference.networking.k8s.io/bbr-managed=true
# Without this label, the payload-processing apikey-injection plugin will NOT load the secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gemini-credentials
  namespace: models-as-a-service
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: gemini-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          inference.networking.k8s.io/bbr-managed: "true"
      data:
        api-key: "{{ .apikey }}"
  data:
    - secretKey: apikey
      remoteRef:
        key: gemini-credentials
        property: api-key
---
