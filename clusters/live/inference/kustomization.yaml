# DEPRECATED: Use clusters/live/inference-a/ or clusters/live/inference-b/ instead.
# This overlay is kept for backward compatibility and redirects to inference-b.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../profiles/multi-cluster/inference-gemma
patches:
  # Guardrails Deployment — VLLM_URL env var (pointing to gemma2-9b-fp8)
  - target:
      kind: Deployment
      name: guardrails-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/1/env/0/value
        value: "https://gemma2-9b-fp8-kserve-workload-svc.models-as-a-service.svc:8000"
  # Guardrails ConfigMap — orchestrator.py with actual VLLM URL
  - target:
      kind: ConfigMap
      name: guardrails-config
    patch: |-
      - op: replace
        path: /data/orchestrator.py
        value: |
          import http.server
          import json
          import ssl
          import urllib.request
          import os

          VLLM_URL = os.environ.get("VLLM_URL", "https://gemma2-9b-fp8-kserve-workload-svc.models-as-a-service.svc:8000")

          class OrchestratorHandler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get("Content-Length", 0))
                  body = self.rfile.read(length)
                  req = json.loads(body)
                  vllm_req = json.dumps(req).encode()
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE
                  vllm_request = urllib.request.Request(
                      f"{VLLM_URL}/v1/chat/completions",
                      data=vllm_req,
                      headers={"Content-Type": "application/json"},
                  )
                  try:
                      with urllib.request.urlopen(vllm_request, context=ctx) as resp:
                          result = resp.read()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(result)
                  except Exception as e:
                      self.send_response(502)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps({"error": str(e)}).encode())

              def log_message(self, format, *args):
                  pass

          if __name__ == "__main__":
              server = http.server.HTTPServer(("0.0.0.0", 8085), OrchestratorHandler)
              print("Orchestrator proxy listening on :8085")
              server.serve_forever()
  # OIDC AuthConfig — MaaS gateway host + Keycloak issuer
  - target:
      kind: AuthConfig
      name: maas-gateway-oidc
    patch: |-
      - op: replace
        path: /spec/hosts/0
        value: aed794ce602fc4585aff1f0ab80130b1-1131672273.us-east-2.elb.amazonaws.com
      - op: replace
        path: /spec/authentication/oidc-jwt/jwt/issuerUrl
        value: https://keycloak-keycloak.apps.cluster-6crhb.6crhb.sandbox1011.opentlc.com/realms/ai-bridge
